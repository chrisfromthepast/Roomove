name: Build and Deploy Roomove
on: 
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    env:
      DSP_PATTERN: '^(lib)?Roomove_DSP\.(a|out|elf)$'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true
          clean: true

      - name: Clean Previous Builds
        shell: powershell
        run: |
          if (Test-Path build_native) { Remove-Item -Recurse -Force build_native }
          if (Test-Path build_dsp) { Remove-Item -Recurse -Force build_dsp }

      # --- 1. DSP BUILD (TI COMPILER) ---
      - name: Check for TI Compiler
        id: check_ti
        shell: powershell
        run: |
          $TI_Path = "C:\TI\c6000_7.4.24\bin\cl6x.exe"
          if (Test-Path $TI_Path) {
              Write-Host "TI Compiler found! Enabling DSP build."
              echo "DSP_ENABLED=true" >> $env:GITHUB_ENV
              echo "AAX_DSP_TYPE=HDX" >> $env:GITHUB_ENV
          } else {
              Write-Host "##[warning] TI Compiler not found. Skipping DSP..."
              echo "DSP_ENABLED=false" >> $env:GITHUB_ENV
              echo "AAX_DSP_TYPE=" >> $env:GITHUB_ENV
          }

      - name: Build TI DSP
        if: env.DSP_ENABLED == 'true'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
          :: Using -S . because we are already in the repo root
          cmake -S . -B build_dsp -G "NMake Makefiles" ^
            -DCMAKE_TOOLCHAIN_FILE="ti_toolchain.cmake" ^
            -DTI_CGT_DIR="C:/TI/c6000_7.4.24" ^
            -DAAX_SDK_PATH="C:/SDKs/AAX-SDK" ^
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build_dsp --config Release --target Roomove_DSP

      # --- 2. NATIVE BUILD (MSVC + JUCE) ---
      - name: Configure and Build Native
        shell: powershell
        run: |
          # Configure
          cmake -S . -B build_native -G "Visual Studio 17 2022" -A x64 `
            -DJUCE_DIR="C:/JUCE_Installed/lib/cmake/JUCE-8.0.12" `
            -DAAX_SDK_PATH="C:/SDKs/AAX-SDK" `
            -DAAX_DSP_TYPE="${{ env.AAX_DSP_TYPE }}" `
            -DCMAKE_BUILD_TYPE=Release
          
          # Build & Package
          $ErrorActionPreference = "Stop"
          Write-Host "Building ALL_BUILD target..."
          cmake --build build_native --config Release --target ALL_BUILD --parallel 8
          
          Write-Host "Building Roomove_AAX_AAX target..."
          cmake --build build_native --config Release --target Roomove_AAX_AAX --parallel 8

      # --- 3. SMART INJECT & STITCH ---
      - name: Verify and Inject
        shell: powershell
        run: |
          $Bundle = Get-ChildItem -Path "build_native\Roomove_AAX_artefacts\Release" -Filter "Roomove.aaxplugin" -Recurse -Directory | Select-Object -First 1
          if (!$Bundle) { throw "CRITICAL: Roomove.aaxplugin folder not found!" }
          
          $BundlePath = $Bundle.FullName
          $ResDir = Join-Path $BundlePath "Contents\Resources"
          
          # Verify native binary exists in Contents/x64 directory
          $Win64Bin = Get-ChildItem -Path $BundlePath -Filter "*.aaxplugin" -Recurse | Where-Object { $_.FullName -match "x64" }
          if (!$Win64Bin) { throw "CRITICAL: Bundle is HOLLOW. Build failed to stitch binary!" }
          
          if (!(Test-Path $ResDir)) { New-Item -ItemType Directory -Force -Path $ResDir }
          
          if ("${{ env.DSP_ENABLED }}" -eq "true") {
              $DSP_Source = Get-ChildItem -Path "build_dsp" -Recurse -File | Where-Object { $_.Name -match $env:DSP_PATTERN } | Select-Object -First 1
              if ($DSP_Source) {
                  $DSP_DestName = $DSP_Source.Name -replace '^lib', ''
                  $DSP_Dest = Join-Path $ResDir $DSP_DestName
                  Copy-Item -Path $DSP_Source.FullName -Destination $DSP_Dest -Force
                  Write-Host "DSP Binary manually injected: $DSP_DestName"
              }
          }
          
          $PageTableSource = "Resources/Roomove_PageTable.xml"
          if (Test-Path $PageTableSource) {
              Copy-Item -Path $PageTableSource -Destination (Join-Path $ResDir "Roomove_PageTable.xml") -Force
          }
          
          Write-Host "Hybrid Bundle Ready at: $BundlePath"

      # --- 4. DEPLOYMENT ---
      - name: Deploy to Pro Tools
        shell: powershell
        run: |
          $Source = Get-ChildItem -Path "build_native\Roomove_AAX_artefacts\Release" -Filter "Roomove.aaxplugin" -Recurse -Directory | Select-Object -First 1
          $Dest = "C:\Program Files\Common Files\Avid\Audio\Plug-Ins\Roomove.aaxplugin"
          
          Get-Process -Name "ProTools", "Venue" -ErrorAction SilentlyContinue | Stop-Process -Force
          
          if (Test-Path $Dest) { Remove-Item -Recurse -Force $Dest }
          Copy-Item -Path $Source.FullName -Destination "C:\Program Files\Common Files\Avid\Audio\Plug-Ins\" -Recurse -Force
          Write-Host "Successfully deployed to $Dest"

      - name: Path Debugger
        if: always()
        shell: powershell
        run: |
           Write-Host "Final check of build directory..."
           Get-ChildItem -Path build_native -Filter "*.aaxplugin" -Recurse
