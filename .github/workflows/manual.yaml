name: Build and Deploy Roomove
on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: true
          clean: true

      - name: Clean Previous Builds
        shell: powershell
        run: |
          if (Test-Path build_native) { Remove-Item -Recurse -Force build_native }
          if (Test-Path build_dsp) { Remove-Item -Recurse -Force build_dsp }

      # --- 1. DSP BUILD (TI COMPILER) - BUILD FIRST ---
      - name: Check for TI Compiler
        id: check_ti
        shell: powershell
        run: |
          $TI_Path = "C:\TI\c6000_7.4.24\bin\cl6x.exe"
          if (Test-Path $TI_Path) {
              Write-Host "TI Compiler found! Enabling DSP build."
              echo "DSP_ENABLED=true" >> $env:GITHUB_ENV
              echo "AAX_DSP_TYPE=HDX" >> $env:GITHUB_ENV
          } else {
              Write-Host "##[warning] TI Compiler not found. Skipping DSP..."
              echo "DSP_ENABLED=false" >> $env:GITHUB_ENV
              echo "AAX_DSP_TYPE=" >> $env:GITHUB_ENV
          }

      - name: Configure & Build DSP
        if: env.DSP_ENABLED == 'true'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
          cmake -B build_dsp -G "NMake Makefiles" ^
            -DCMAKE_TOOLCHAIN_FILE="ti_toolchain.cmake" ^
            -DAAX_SDK_PATH="C:/SDKs/AAX-SDK" ^
            -DTI_CGT_DIR="C:/TI/c6000_7.4.24" ^
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build_dsp --config Release --target Roomove_DSP

      - name: Prepare DSP Artifacts for Integration
        if: env.DSP_ENABLED == 'true'
        shell: powershell
        run: |
          # Create a staging directory for DSP artifacts that JUCE can find
          $DSP_Stage = "dsp_artifacts"
          $DSP_Pattern = '^(lib)?Roomove_DSP\.(a|out|elf)$'
          if (!(Test-Path $DSP_Stage)) { New-Item -ItemType Directory -Force -Path $DSP_Stage | Out-Null }

          $DSP_Binary = Get-ChildItem -Path "build_dsp" -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match $DSP_Pattern } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1

          if ($DSP_Binary) {
              $DSP_Staged_Path = Join-Path $DSP_Stage "Roomove_DSP$($DSP_Binary.Extension)"
              Copy-Item -Path $DSP_Binary.FullName -Destination $DSP_Staged_Path -Force
              "DSP_STAGED_PATH=$((Resolve-Path $DSP_Staged_Path).Path)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              Write-Host "DSP binary staged from $($DSP_Binary.FullName) to $DSP_Staged_Path"
          } else {
              Write-Error "DSP build succeeded but no Roomove DSP binary was found under build_dsp."
              exit 1
          }

      # --- 2. NATIVE BUILD (MSVC + JUCE) - WITH DSP INTEGRATION ---
      - name: Configure Native (x64) with DSP Support
        shell: powershell
        run: |
          # Pass DSP configuration to CMake for JUCE integration
          cmake -B build_native -G "Visual Studio 17 2022" -A x64 `
            -DJUCE_DIR="C:/JUCE_Installed/lib/cmake/JUCE-8.0.12" `
            -DAAX_SDK_PATH="C:/SDKs/AAX-SDK" `
            -DAAX_DSP_TYPE="${{ env.AAX_DSP_TYPE }}" `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build and Package AAX
        shell: cmd
        run: |
          :: Build the shared code first
          cmake --build build_native --config Release --target ALL_BUILD --parallel 8
          :: Force the JUCE stitching/packaging tool to run
          cmake --build build_native --config Release --target Roomove_AAX_AAX --parallel 8

      # --- 3. POST-BUILD: INJECT RESOURCES ---
      - name: Inject Page Table Resource
        shell: powershell
        run: |
          # Path logic for JUCE 8 AAX artifacts
          $Artifacts_Root = "build_native/Roomove_AAX_artefacts/Release/AAX/Roomove.aaxplugin"
          $Contents_Root = "$Artifacts_Root/Contents"
          $Win64_Bin = "$Artifacts_Root/Contents/x64/Roomove.aaxplugin"
          $Bundle_Res = "$Contents_Root/Resources/"
          $DSP_Pattern = '^(lib)?Roomove_DSP\.(a|out|elf)$'

          # Verify the native binary was built correctly
          if (!(Test-Path $Win64_Bin)) {
              Write-Error "CRITICAL FAILURE: Native binary missing at $Win64_Bin. Packaging failed!"
              exit 1
          }

          Write-Host "Native binary verified at $Win64_Bin"

          # Check if DSP was integrated by JUCE (if DSP build was enabled)
          if ("${{ env.DSP_ENABLED }}" -eq "true") {
              $DSP_Check = Get-ChildItem -Path $Contents_Root -Recurse -File -ErrorAction SilentlyContinue |
                  Where-Object { $_.Name -match $DSP_Pattern } |
                  Select-Object -First 1
              if ($DSP_Check) {
                  Write-Host "SUCCESS: DSP binary integrated by JUCE: $($DSP_Check.FullName)"
              } else {
                  Write-Warning "DSP was built but not found in bundle. Manual injection may be needed."
                  # Fallback: manual injection if JUCE didn't handle it
                  if ($env:DSP_STAGED_PATH -and (Test-Path $env:DSP_STAGED_PATH)) {
                      if (!(Test-Path $Bundle_Res)) { New-Item -ItemType Directory -Force -Path $Bundle_Res | Out-Null }
                      $DSP_Destination = Join-Path $Bundle_Res (Split-Path $env:DSP_STAGED_PATH -Leaf)
                      Copy-Item -Path $env:DSP_STAGED_PATH -Destination $DSP_Destination -Force
                      Write-Host "DSP Binary injected from $env:DSP_STAGED_PATH to $DSP_Destination"
                  } else {
                      Write-Error "DSP build was enabled, but no staged DSP artifact was available for injection."
                      exit 1
                  }
              }
          }

          # Inject Page Table (Critical for S6L control surface)
          if (!(Test-Path $Bundle_Res)) { New-Item -ItemType Directory -Force -Path $Bundle_Res | Out-Null }
          if (Test-Path "Resources/Roomove_PageTable.xml") {
              Copy-Item -Path "Resources/Roomove_PageTable.xml" -Destination $Bundle_Res -Force
              Write-Host "Page Table injected successfully."
          } else {
              Write-Warning "Page Table XML not found at Resources/Roomove_PageTable.xml"
          }

      # --- 4. DEPLOYMENT ---
      - name: Deploy to Pro Tools
        shell: powershell
        run: |
          $Source = "build_native/Roomove_AAX_artefacts/Release/AAX/Roomove.aaxplugin"
          $Dest = "C:\Program Files\Common Files\Avid\Audio\Plug-Ins\Roomove.aaxplugin"
          
          # Kill Pro Tools/Venue if running to unlock files
          Get-Process -Name "ProTools", "Venue" -ErrorAction SilentlyContinue | Stop-Process -Force
          
          if (Test-Path $Dest) { Remove-Item -Recurse -Force $Dest }
          Copy-Item -Path $Source -Destination "C:\Program Files\Common Files\Avid\Audio\Plug-Ins\" -Recurse -Force
          Write-Host "Successfully deployed to $Dest"

      # --- 5. LOGGING FALLBACK ---
      - name: Path Debugger
        if: always()
        shell: powershell
        run: |
           Write-Host "Final check of build directory..."
           Get-ChildItem -Path build_native -Filter "*.aaxplugin" -Recurse
